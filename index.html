<!DOCTYPE html>
<html>
<head>
  <title>My WoW Builds</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 40px;
    }

    .section-title {
      color: white;
      font-size: 24px;
      margin-top: 40px;
      margin-bottom: 10px;
    }

    .card {
      padding: 20px;
      margin: 15px auto;
      border-radius: 10px;
      max-width: 500px;
    }

    /* Pres = dim dark green */
    .pres {
      background: #14532d;
    }

    /* Dev = dim dark red */
    .dev {
      background: #7f1d1d;
    }

    /* Neutral cards */
    .neutral {
      background: #1e293b;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 10px 20px;
      color: black;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>

  <h1>WoW Export Strings</h1>

  <!-- Profiles -->
  <div class="card neutral">
    <h2>Platynator Profile</h2>
    <button onclick="copyText('plat')">Copy</button>
    <textarea id="plat" style="display:none;">PASTE STRING HERE</textarea>
  </div>

  <div class="card neutral">
    <h2>BCDM Profile</h2>
    <button onclick="copyText('bcdm')">Copy</button>
    <textarea id="bcdm" style="display:none;">PASTE STRING HERE</textarea>
  </div>

  <!-- M+ Section -->
  <div class="section-title">M+</div>

  <div class="card pres">
    <h2>Pres</h2>
    <button onclick="copyText('mplus-pres')">Copy</button>
    <textarea id="mplus-pres" style="display:none;">PASTE STRING HERE</textarea>
  </div>

  <div class="card dev">
    <h2>Dev</h2>
    <button onclick="copyText('mplus-dev')">Copy</button>
    <textarea id="mplus-dev" style="display:none;">PASTE STRING HERE</textarea>
  </div>

  <!-- Raid Section -->
  <div class="section-title">Raid</div>

  <div class="card pres">
    <h2>Pres</h2>
    <button onclick="copyText('raid-pres')">Copy</button>
    <textarea id="raid-pres" style="display:none;">PASTE STRING HERE</textarea>
  </div>

  <div class="card dev">
    <h2>Dev Cleave</h2>
    <button onclick="copyText('raid-dev-cleave')">Copy</button>
    <textarea id="raid-dev-cleave" style="display:none;">PASTE STRING HERE</textarea>
  </div>

  <div class="card dev">
    <h2>Dev ST</h2>
    <button onclick="copyText('raid-dev-st')">Copy</button>
    <textarea id="raid-dev-st" style="display:none;">PASTE STRING HERE</textarea>
  </div>

  <!-- Addons Section -->
  <div class="section-title">Addons</div>

  <div class="card neutral">
    <h2>SCRAW Utilities</h2>
    <button onclick="openLink('addon')">Go to Page</button>
  </div>

  <!-- Links Section -->
  <div class="section-title">Links</div>

  <div class="card neutral">
    <h2>Twitch</h2>
    <button onclick="openLink('twitch')">Go</button>
  </div>

  <div class="card neutral">
    <h2>YouTube</h2>
    <button onclick="openLink('youtube')">Go</button>
  </div>

  <script>
    function copyText(id) {
      var text = document.getElementById(id);
      text.style.display = "block";
      text.select();
      document.execCommand("copy");
      text.style.display = "none";
      alert("Copied to clipboard!");
    }

    function openLink(type) {
      let url = "";

      if (type === "addon") url = "PASTE LINK HERE";
      if (type === "twitch") url = "PASTE LINK HERE";
      if (type === "youtube") url = "PASTE LINK HERE";

      window.open(url, "_blank");
    }
  </script>

</body>
</html>
