<!DOCTYPE html>
<html>
<head>
  <title>Nat's WoW Builds</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
      margin: 0;
    }
    
    h1 {
      margin-bottom: 20px;
    }
    
    .top-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
      font-size: 18px;
      align-items: center;
    }
    
    .top-links a {
      color: #38bdf8;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    
    .top-links a:hover {
      color: #0ea5e9;
    }
    
    .top-links img {
      width: 20px;
      height: 20px;
    }
    
    .card {
      padding: 15px;
      border-radius: 15px;
      max-width: 350px;
      box-sizing: border-box;
      transition: all 0.25s ease;
      will-change: transform, box-shadow;
    }
    
    .card:hover {
      transform: translateY(-5px) scale(1.02);
    }
    
    .pres { background: #14532d; }
    .dev { background: #7f1d1d; }
    .neutral { background: #1e293b; }
    
    .pres:hover {
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.7),
                  0 0 30px rgba(34, 197, 94, 0.4);
    }
    
    .dev:hover {
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.7),
                  0 0 30px rgba(239, 68, 68, 0.4);
    }
    
    .neutral:hover {
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.7),
                  0 0 30px rgba(56, 189, 248, 0.4);
    }
    
    button {
      background: #38bdf8;
      border: none;
      padding: 8px 16px;
      color: black;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s ease;
    }
    
    button:hover { background: #0ea5e9; }
    
    button.copied {
      background: #22c55e;
      color: white;
    }
    
    .section-title {
      color: white;
      font-size: 22px;
      margin-top: 30px;
      margin-bottom: 10px;
    }
    
    textarea {
      display: none;
    }
    
    .profile-container {
      max-width: 860px;
      margin: 0 auto;
    }
    
    .profile-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .profile-row .card {
      flex: 0 0 auto;
      width: 280px;
      margin: 0px;
    }
  
    .three-column {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin: 10px;
    }
    
    .column {
      width: 320px;
    }
    
    .column .card {
      max-width: 100%;
      margin: 10px;
    }
  
    .center-column {
      width: 220px;
      display: flex;
      justify-content: center;
    }
  
    .macros-wrapper {
      background: #1e293b;
      padding: 3px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 45px;
    }
  
    .macros-wrapper:hover {
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.5),
                  0 0 25px rgba(56, 189, 248, 0.3);
      transition: 0.2s;
    }
  
    .macros-wrapper button {
      border-radius: 7px;
    }
  
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 60px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.85);
    }
  
    .modal-content {
      margin: auto;
      display: block;
      max-width: 80%;
      max-height: 80%;
      border-radius: 10px;
    }
  
    .close {
      position: absolute;
      top: 20px;
      right: 35px;
      color: white;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

  <script>
    function copyText(id, btn) {
      var text = document.getElementById(id);
      var value = text.value.trim();
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(value).then(() => showCopiedState(btn)).catch(() => fallbackCopy(text, btn));
      } else {
        fallbackCopy(text, btn);
      }
    }

    function fallbackCopy(textElement, btn) {
      textElement.style.display = "block";
      textElement.select();
      document.execCommand("copy");
      textElement.style.display = "none";
      showCopiedState(btn);
    }

    function showCopiedState(btn) {
      btn.textContent = "Copied";
      btn.classList.add("copied");
      setTimeout(() => {
        btn.textContent = "Copy";
        btn.classList.remove("copied");
      }, 1500);
    }

    function openLink(type) {
      let url = "";
      if (type === "addon") url = "https://www.curseforge.com/wow/addons/scrawutilities";
      if (type === "twitch") url = "https://www.twitch.tv/natrazalth";
      if (type === "youtube") url = "https://www.youtube.com/@natrazalth";
      if (type === "raiderio") url = "https://raider.io/characters/us/tichondrius/Natrazalth";
      if (type === "wcl") url = "https://www.warcraftlogs.com/character/us/tichondrius/natrazalth";
      if (type === "macros") url = "https://natrazalth.github.io/WoW/macros.html";
      window.open(url, "_blank");
    }

    function openImage(type) {
      const modal = document.getElementById("imageModal");
      const img = document.getElementById("modalImg");

      if (type === "bcdm-img") {
        img.src = "https://raw.githubusercontent.com/natrazalth/WoW/main/BCDM.png";
      }

      if (type === "plat-img") {
        img.src = "https://raw.githubusercontent.com/natrazalth/WoW/main/Plater.png";
      }

      modal.style.display = "block";
    }

    function closeImage(event) {
      const modal = document.getElementById("imageModal");
      if (event.target.classList.contains("modal") || event.target.classList.contains("close")) {
        modal.style.display = "none";
      }
    }

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        document.getElementById("imageModal").style.display = "none";
      }
    });
  </script>
