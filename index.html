<!DOCTYPE html>
<html>
<head>
  <title>My WoW Builds</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* Top links */
    .top-links {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 40px;
      font-size: 18px;
      align-items: center;
    }

    .top-links a {
      color: #38bdf8;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }

    .top-links a:hover {
      color: #0ea5e9;
    }

    .top-links img {
      width: 20px;
      height: 20px;
    }

    /* Cards */
    .card {
      padding: 15px;
      margin: 10px auto;
      border-radius: 8px;
      max-width: 400px;
    }

    .two-column, .profile-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .column {
      width: 350px;
    }

    .profile-row .card {
      width: 300px;
    }

    /* Card colors */
    .pres { background: #14532d; }
    .dev { background: #7f1d1d; }
    .neutral { background: #1e293b; }

    button {
      background: #38bdf8;
      border: none;
      padding: 8px 16px;
      color: black;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s ease;
    }

    button:hover { background: #0ea5e9; }

    button.copied {
      background: #22c55e;
      color: white;
    }

    .section-title {
      color: white;
      font-size: 22px;
      margin-top: 30px;
      margin-bottom: 10px;
    }

    textarea {
      display: none;
    }
  </style>
</head>
<body>

  <h1>WoW Export Strings</h1>

  <!-- Top Links -->
  <div class="top-links">
    <a href="https://www.youtube.com/@natrazalth" target="_blank">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" alt="YouTube"> YouTube
    </a>
    <a href="https://www.twitch.tv/natrazalth" target="_blank">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/twitch.svg" alt="Twitch"> Twitch
    </a>
    <a href="https://www.curseforge.com/wow/addons/scrawutilities" target="_blank">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/curseforge.svg" alt="CurseForge"> SCRAW Utilities
    </a>
  </div>

  <!-- Profiles Side by Side -->
  <div class="profile-row">
    <div class="card neutral">
      <h2>Platynator Profile</h2>
      <button onclick="copyText('plat', this)">Copy</button>
      <textarea id="plat">PASTE STRING HERE</textarea>
    </div>

    <div class="card neutral">
      <h2>BCDM Profile</h2>
      <button onclick="copyText('bcdm', this)">Copy</button>
      <textarea id="bcdm">PASTE STRING HERE</textarea>
    </div>
  </div>

  <!-- M+ and Raid side by side -->
  <div class="two-column">

    <!-- M+ -->
    <div class="column">
      <div class="section-title">M+</div>

      <div class="card pres">
        <h2>Pres</h2>
        <button onclick="copyText('mplus-pres', this)">Copy</button>
        <textarea id="mplus-pres">CwbBPJc41CfcseY0baneJ1IHrBAAAAAMzMz2yADzMPwsYmZM2GAAAzwYGjxMiZGAAAgZmRzwMzMLzMDAMmZMz2CLWYYmZmGa2MsYYmZGMzMGA</textarea>
      </div>

      <div class="card dev">
        <h2>Dev</h2>
        <button onclick="copyText('mplus-dev', this)">Copy</button>
        <textarea id="mplus-dev">CsbBPJc41CfcseY0baneJ1IHrBAAAAAAAAAAAzMDMDzwMMmBjZaMzMNjxyMmZmZmHYmZGgZmxYmZZMDMwMzwCsMmlGbzMMZmsA2GmBzMAD</textarea>
      </div>
    </div>

    <!-- Raid -->
    <div class="column">
      <div class="section-title">Raid</div>

      <div class="card pres">
        <h2>Pres</h2>
        <button onclick="copyText('raid-pres', this)">Copy</button>
        <textarea id="raid-pres">CwbBPJc41CfcseY0baneJ1IHrBAAAAAMzMz2yADzMPwsYmZMzywAAAzwYGMmRj5BGAAAgZmRmZmZmZZMDAGYMjNWgBmRDNgFYmZGAGA</textarea>
      </div>

      <div class="card dev">
        <h2>Dev Cleave</h2>
        <button onclick="copyText('raid-dev-cleave', this)">Copy</button>
        <textarea id="raid-dev-cleave">PASTE STRING HERE</textarea>
      </div>

      <div class="card dev">
        <h2>Dev ST</h2>
        <button onclick="copyText('raid-dev-st', this)">Copy</button>
        <textarea id="raid-dev-st">CsbBPJc41CfcseY0baneJ1IHrBAAAAAAAAAAgZmZwMDzwMDMYMTjZmJjxyYmZGzMzMzAmhxYmZZmZgBGDWglxox2AyMBYDzgZGMMA</textarea>
      </div>
    </div>

  </div>

  <script>
    function copyText(id, btn) {
      var text = document.getElementById(id);
      var value = text.value.trim();

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(value).then(() => {
          showCopiedState(btn);
        }).catch(() => {
          fallbackCopy(text, btn);
        });
      } else {
        fallbackCopy(text, btn);
      }
    }

    function fallbackCopy(textElement, btn) {
      textElement.style.display = "block";
      textElement.select();
      document.execCommand("copy");
      textElement.style.display = "none";
      showCopiedState(btn);
    }

    function showCopiedState(btn) {
      btn.textContent = "Copied";
      btn.classList.add("copied");

      setTimeout(() => {
        btn.textContent = "Copy";
        btn.classList.remove("copied");
      }, 1500);
    }
  </script>

</body>
</html>
