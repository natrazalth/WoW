<!DOCTYPE html>
<html>
<head>
  <title>Nat's WoW Macros</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    h1 {
      margin-bottom: 20px;
    }

    .back-button {
      background: #38bdf8;
      border: none;
      padding: 8px 16px;
      color: black;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 30px;
      transition: 0.2s ease;
    }

    .back-button:hover {
      background: #0ea5e9;
    }

    .macro-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .macro-card {
      background: #1e293b;
      border-radius: 15px;
      width: 250px;
      box-sizing: border-box;
      padding: 10px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
    }

    .macro-card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.5),
                  0 0 25px rgba(56, 189, 248, 0.3);
    }

    .macro-card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .macro-card h2 {
      font-size: 18px;
      margin: 10px 0;
    }

    .macro-card textarea {
      width: 100%;
      resize: none;
      display: none;
    }

    .copy-button {
      background: #38bdf8;
      border: none;
      padding: 8px 16px;
      color: black;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .copy-button:hover {
      background: #0ea5e9;
    }

    .copy-button.copied {
      background: #22c55e;
      color: white;
    }
  </style>
</head>
<body>

<h1>Nat's WoW Macros</h1>

<button class="back-button" onclick="window.location.href='index.html'">← Back to Main Page</button>

<div class="macro-grid">
  <div class="macro-card" onclick="copyMacro('deepbreath')">
    <img src="deepbreath.png" alt="Deep Breath Screenshot">
    <h2>Deep Breath</h2>
    <textarea id="deepbreath">#showtooltip
      /cast Deep Breath
      /cancelaura Deep Breath</textarea>
    <button class="copy-button" onclick="copyMacro('deepbreath', event)">Copy</button>
  </div>

  <div class="macro-card" onclick="copyMacro('focusinterrupt')">
    <img src="interrupt.png" alt="Focus Interrupt Screenshot">
    <h2>Focus Interrupt</h2>
    <textarea id="focusinterrupt">#showtooltip Quell
      /cast [@focus, exists] Quell
      /cast [@mouseover, exists] Quell
      /cast [@target, exists] Quell</textarea>
    <button class="copy-button" onclick="copyMacro('focusinterrupt', event)">Copy</button>
  </div>
</div>

<script>
function copyMacro(id, event) {
  if(event) event.stopPropagation();
  const textarea = document.getElementById(id);
  textarea.style.display = "block";
  textarea.select();
  document.execCommand("copy");
  textarea.style.display = "none";

  if(event) {
    const button = event.currentTarget;
    button.classList.add('copied');
    button.innerText = "Copied!";
    setTimeout(() => {
      button.classList.remove('copied');
      button.innerText = "Copy";
    }, 1500);
  }
}
</script>

</body>
</html>
